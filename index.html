<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Button</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19; /* আপনার ব্যাকগ্রাউন্ড কালার অনুযায়ী */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registration-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(135deg, #00b4d8, #2563eb);
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
            transition: all 0.3s ease;
        }

        .registration-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .registration-btn .arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .registration-btn:hover .arrow {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <a href="#" class="registration-btn">
        Fill Up Registration Form <span class="arrow">&rarr;</span>
    </a>

</body>
</html>
